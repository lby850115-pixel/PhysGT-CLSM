baselines:
  cellpose:
    manuscript_role: "generalist deep-learning segmentation baseline"
    wrapper: "baselines/run_cellpose.py"
    official_source: "https://github.com/MouseLand/cellpose"
    install_hint: "pip install cellpose"
    parameters:
      model: "bact_fluor_cp3"
      diameter: "0 (auto)"
      flow_threshold: 0.4
      cellprob_threshold: 0.0
      min_area_px2: 5
    redistributed_here: "wrapper only; no upstream source or weights"

  mitosegnet:
    manuscript_role: "supervised mitochondria U-Net baseline"
    wrapper: "baselines/run_mitosegnet_34.py"
    checkpoint_expected: "/home/zhishi/LBY_CELL/checkpoints/mitosegnet/mitosegnet_best.pt"
    parameters:
      threshold: 0.5
      tile_size: 256
      overlap: 32
      min_area_px2: 10
    redistributed_here: "inference wrapper only; checkpoint not bundled"

  modl:
    manuscript_role: "model-based deep-learning baseline"
    wrapper: "baselines/run_modl_34.py"
    weights_expected: "/home/zhishi/LBY_CELL/MoDL/model/U-RNet+.hdf5"
    parameters:
      threshold: 0.9
      tile_size: 512
      overlap: 64
      min_distance_px: 8
      min_area_px2: 10
    redistributed_here: "inference wrapper only; upstream weights not bundled"

  nellie_style:
    manuscript_role: "mitochondrial network analysis baseline"
    wrapper: "baselines/run_nellie_style.py"
    official_source: "cite and install Nellie from the original authors when exact package reproduction is required"
    parameters:
      frangi_sigmas: [1, 2, 3, 4]
      threshold: "50th percentile of positive Frangi response"
      min_area_px2: 25
    redistributed_here: "study wrapper/re-implementation only"

  mitometer_style:
    manuscript_role: "classical mitochondrial quantification baseline"
    wrapper: "baselines/run_mitometer_style.py"
    parameters:
      channel: 1
      min_area_px2: 5
      max_area_px2: 2000
      sigma_grid: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]
    redistributed_here: "study wrapper/re-implementation only"
